<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo azul escuro com bordas arredondadas -->
  <rect width="64" height="64" rx="14" fill="#1E3A5F"/>

  <!-- Prancheta (corpo) -->
  <rect x="15" y="18" width="34" height="38" rx="4" fill="none" stroke="#93C5FD" stroke-width="3"/>

  <!-- Prendedor da prancheta (clip) -->
  <rect x="23" y="13" width="18" height="10" rx="3" fill="#93C5FD"/>
  <rect x="27" y="15" width="10" height="6" rx="2" fill="#1E3A5F"/>

  <!-- Linhas de texto -->
  <line x1="21" y1="33" x2="43" y2="33" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21" y1="40" x2="43" y2="40" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Check mark (última linha menor + ícone check) -->
  <line x1="21" y1="47" x2="34" y2="47" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="37,44 40,48 44,43" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
